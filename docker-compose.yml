services:
  backend:
    build: 
      context: ./
      dockerfile: Dockerfile
    container_name: laravel
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    networks:
      - weft-network
  reverb:
    build: 
      context: ./
      dockerfile: Dockerfile
    container_name: reverb
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - weft-network
    command: ["php", "artisan", "reverb:start"]  
    depends_on:
      - backend  
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "85:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/html/public
    depends_on:
      - backend
      - reverb
    networks:
      - weft-network
  db:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - weft-network
    ports:
      - "3307:3306"
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - weft-network
networks: 
  weft-network:
    driver: bridge
volumes:
  db_data:
    driver: local
